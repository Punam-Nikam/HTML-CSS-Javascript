<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css list styling</title>
    <style>
        nav ul li{
            /* list-style: devanagari; */
            list-style-type: "👻";
            background-color:yellow;
            list-style-position: inside;
            /* border: 2px solid black; */
            padding: 5px;
            /* list-style-image: url(doraimg.png); */
        }
        nav ul{
            display: flex;
            padding: 23px;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>
</body>
</html>
