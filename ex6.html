<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        .logo{
            width: 40px;
            height: 23px;
            background-color: chocolate;  
        }
        nav{
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .right ul{
            display: flex;
            list-style: none;
            padding: 12px;
        }
        .right ul li{
            padding: 8px 16px;
            gap: 22px;
            justify-content:end;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">

            </div>
            <div class="right">
                <ul>
                    <li>Product</li>
                    <li>Prizing</li>
                    <li>Resources</li>
                    <li>About us</li>
                </ul>
            </div>
        </nav>
    </header>
</body>
</html>
