<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Card</title>
    <style>
        body{
            background-color: rgb(151, 167, 182);
        }
        .card{
            background-color: white;
            height: 550px;
            width: 350px;
            border-radius: 7px;
            padding: 0 0 44px 0; /*bottom padding */
        }
        .image{
            padding: 10px;
        }
        .image img{
            border-radius: 7px;
        }
        .content{
            padding: 3px 3px;
        }
        .content p{
            font-size: 18px;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 9px;
        }
        .capsules{
            padding: 0 36px 0 26px;
        }
        .capsules span{
            border: 1px solid rgb(214, 210, 210);
            padding: 4px;
            border-radius: 9px;
            font-size: 17px;
        }
        .button{
            text-align: center;
           
        }
        .button button{
            padding: 7px 9px;
            border-radius: 15px;
            background-color: rgb(216, 226, 246);
            color: rgb(28, 164, 214);
            border: none;
            font-size: 14px;
            font-weight: bold;
        }
       
        </style>
</head>
<body>
    <div class="card">
        <div class="image">
            <img src="https://tse4.mm.bing.net/th/id/OIP.ugGA8xTz2VKHAkmBK5V-SwHaE8?r=0&rs=1&pid=ImgDetMain&o=7&rm=3" alt="" width="330">
        </div>
        <div class="capsules">
            <span>Nature</span>
            <span>Lake</span>
        </div>
        <div class="content">
            <h1>Card Designing</h1>
            <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Repellat consequatur ducimus voluptates? ipsum dolor sit amet consectetur adipisicing elit. Alias ex velit nulla at assumenda dignissimos voluptatibus tenetur error quod saepe, eius eum dolorem!</p>
        </div>
        <div class="button">
            <button>Read more</button>
        </div>
    </div>
</body>
</html>
