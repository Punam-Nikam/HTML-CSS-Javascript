<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css shadow</title>
    <style>
        .box {
            border: 2px solid black;
            padding: 35px;
            box-shadow: inset 12px 20px 20px rgb(218 87 182);
        }

        .txt {
            text-shadow: 2px 2px 4px rgb(205, 12, 57);
            font-size: large;
            outline: 10px solid blue;
            border: 22px solid darkgreen;
            outline-offset: 6px;
        }
    </style>
</head>

<body>
    <div class="box">I am a box</div>
    <p class="txt">Lorem ipsum dolor sit, amet consectetur adipisicing elit. Expedita quisquam molestiae placeat velit,
        animi assumenda voluptatibus adipisci blanditiis soluta libero, suscipit reprehenderit? In maxime delectus ad.
        Nemo sequi ea dolores necessitatibus suscipit ex facilis.</p>
</body>

</html>
