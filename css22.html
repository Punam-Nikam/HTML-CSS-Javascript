<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css filter</title>
    <style>
        .img1{
            width: 200px;
            filter: blur(3px);
        }
        .img2{
            width: 250px;
            filter: grayscale(100%);
            /* filter: sepia(100%); */
            /* filter:contrast(2); */
        }
        .img3{
            width: 300px;
            filter: brightness(122%);
            /* filter: invert(); */
            /* filter: opacity(2); */
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="img1" src="VD.jpg" alt="">
        <img class="img2" src="thalapathy.jpg" alt="">
        <img class="img3" src="deverconda.jpg" alt="">
    </div>
</body>
</html>
