<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css position</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .box {
            border: 2px solid black;
            height: 40vh;
            width: 50vw;
            margin: 2px;
            padding: 3px;
        }

        .parent {
            padding: 43px;
            margin: 34px;
            border: 3px solid red;
        }
        .box0 {
            background-color: darkblue;
            position:sticky;
             top: 1px;   
               }
        .box1 {
            background-color: greenyellow;
            position: absolute;
            top: 290px;
            left: 140px;
        }

        .box3 {
            background-color: purple;
            position: relative;

            top: -120px;
            left: 184px;
        }

        .box2 {
            background-color: crimson;
            position: relative;
            top: -25px;
            left: 144px;
        }

       
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box0"></div>
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
    </div>
</body>

</html>
